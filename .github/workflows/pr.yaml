name: PR Validation

on:
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: alicenstar/astrid

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run tests
        run: |
          docker run -d --name pg -e POSTGRES_USER=astrid -e POSTGRES_PASSWORD=astrid -e POSTGRES_DB=astrid -p 5432:5432 postgres:16-alpine
          docker run -d --name redis -p 6379:6379 redis:7-alpine
          sleep 3
          docker exec pg psql -U astrid -d postgres -c "CREATE DATABASE astrid_test OWNER astrid;" || true
          go test ./... -p 1 -count=1

      - name: Helm dependency build
        run: helm dependency build chart/astrid

      - name: Helm lint
        run: helm lint chart/astrid

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set release version
        id: version
        run: |
          BASE=$(grep '^version:' chart/astrid/Chart.yaml | awk '{print $2}')
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          VERSION="${BASE}-pr.${{ github.event.pull_request.number }}+${{ github.sha }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "PR version: ${VERSION}"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.base }}-pr.${{ github.event.pull_request.number }}

      - name: Stamp chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" chart/astrid/Chart.yaml

      - name: Package Helm chart
        run: helm package chart/astrid -d .

      - name: Create Replicated release
        id: create-release
        uses: replicatedhq/replicated-actions/create-release@v1
        with:
          app-slug: ${{ secrets.REPLICATED_APP }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          chart: astrid-${{ steps.version.outputs.version }}.tgz
          promote-channel: Unstable
          version: ${{ steps.version.outputs.version }}

      - name: Create CMX cluster
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: k3s
          kubernetes-version: "1.35"
          ttl: 20m
          export-kubeconfig: true

      - name: Create Docker Hub pull secret
        run: |
          kubectl create secret docker-registry dockerhub \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKERHUB_USERNAME }} \
            --docker-password=${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy to test cluster
        run: |
          helm install astrid chart/astrid \
            --set image.repository=${{ env.IMAGE_NAME }} \
            --set image.tag=${{ steps.version.outputs.base }}-pr.${{ github.event.pull_request.number }} \
            --set imagePullSecrets[0].name=dockerhub \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=astrid --timeout=120s
          kubectl get pods

      - name: Remove CMX cluster
        if: always() && steps.create-cluster.outputs.cluster-id != ''
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
