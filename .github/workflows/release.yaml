name: Release

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: alicenstar/astrid

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tests
        run: |
          docker run -d --name pg -e POSTGRES_USER=astrid -e POSTGRES_PASSWORD=astrid -e POSTGRES_DB=astrid -p 5432:5432 postgres:16-alpine
          docker run -d --name redis -p 6379:6379 redis:7-alpine
          sleep 3
          docker exec pg psql -U astrid -d postgres -c "CREATE DATABASE astrid_test OWNER astrid;" || true
          go test ./... -p 1 -count=1

      - name: Set release version
        id: version
        run: |
          BASE=$(grep '^version:' chart/astrid/Chart.yaml | awk '{print $2}')
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${BASE}+${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Build and push image
        uses: docker/build-push-action@v7
        id: build-and-push
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.base }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the container image
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.base }}@${{ steps.build-and-push.outputs.digest }}" \
            "${{ env.IMAGE_NAME }}:latest@${{ steps.build-and-push.outputs.digest }}"

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -fsSL \
            | tar xz -C /usr/local/bin replicated

      - name: Helm dependency build
        run: helm dependency build chart/astrid

      - name: Prepare release artifacts
        run: |
          mkdir -p release-manifests
          cp kots-config.yaml replicated-app.yaml embedded-cluster-config.yaml release-manifests/
          sed "s/    chartVersion:.*/    chartVersion: ${{ steps.version.outputs.base }}/" helmchart.yaml \
            > release-manifests/helmchart.yaml
          helm package chart/astrid -d release-manifests

      - name: Create release
        id: create-release
        uses: replicatedhq/replicated-actions/create-release@v1
        with:
          app-slug: ${{ secrets.REPLICATED_APP }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: release-manifests
          version: ${{ steps.version.outputs.version }}

      - name: Promote to Unstable
        run: |
          CHANNEL_ID=$(replicated channel ls --app ${{ secrets.REPLICATED_APP }} --token ${{ secrets.REPLICATED_API_TOKEN }} | awk '/Unstable/{print $1}')
          replicated release promote ${{ steps.create-release.outputs.release-sequence }} "$CHANNEL_ID" \
            --app ${{ secrets.REPLICATED_APP }} \
            --token ${{ secrets.REPLICATED_API_TOKEN }} \
            --version "${{ steps.version.outputs.version }}"

      - name: Verify Unstable promotion
        run: |
          SEQ="${{ steps.create-release.outputs.release-sequence }}"
          CURRENT=$(replicated channel ls --app ${{ secrets.REPLICATED_APP }} --token ${{ secrets.REPLICATED_API_TOKEN }} | awk '/Unstable/{print $3}')
          if [ "$CURRENT" != "$SEQ" ]; then
            echo "ERROR: Unstable is on release $CURRENT, expected $SEQ"
            echo "This usually means a semver constraint silently rejected the promotion."
            exit 1
          fi
          echo "Unstable confirmed on release $SEQ"

      - name: Smoke test on CMX
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: k3s
          kubernetes-version: "1.35"
          ttl: 20m
          export-kubeconfig: true

      - name: Create Docker Hub pull secret
        run: |
          kubectl create secret docker-registry dockerhub \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKERHUB_USERNAME }} \
            --docker-password=${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy and verify
        run: |
          helm install astrid chart/astrid \
            --set image.repository=${{ env.IMAGE_NAME }} \
            --set image.tag=${{ steps.version.outputs.base }} \
            --set imagePullSecrets[0].name=dockerhub \
            --set replicated.enabled=false \
            --set postgresql.image.registry=docker.io \
            --set postgresql.image.repository=bitnamilegacy/postgresql \
            --set redis.image.registry=docker.io \
            --set redis.image.repository=bitnamilegacy/redis \
            --set initImage=busybox:1.36 \
            --wait --timeout 5m
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=astrid --timeout=120s

      - name: Remove CMX cluster
        if: always() && steps.create-cluster.outputs.cluster-id != ''
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
