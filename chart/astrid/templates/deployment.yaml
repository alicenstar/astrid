apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "astrid.fullname" . }}
  labels:
    {{- include "astrid.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "astrid.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "astrid.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              {{- if .Values.postgresql.enabled }}
              until nc -z {{ include "astrid.fullname" . }}-postgresql 5432; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              {{- else }}
              until nc -z {{ .Values.externalDatabase.host }} {{ .Values.externalDatabase.port }}; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              {{- end }}
              echo "PostgreSQL is ready!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: astrid
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              value: {{ include "astrid.databaseURL" . | quote }}
            - name: REDIS_URL
              value: {{ include "astrid.redisURL" . | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
