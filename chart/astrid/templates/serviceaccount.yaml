apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "astrid.fullname" . }}
  labels:
    {{- include "astrid.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "astrid.fullname" . }}-support-bundle
  labels:
    {{- include "astrid.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "secrets", "configmaps", "nodes", "namespaces", "events", "persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "astrid.fullname" . }}-support-bundle
  labels:
    {{- include "astrid.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "astrid.fullname" . }}-support-bundle
subjects:
  - kind: ServiceAccount
    name: {{ include "astrid.fullname" . }}
    namespace: {{ .Release.Namespace }}
