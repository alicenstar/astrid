global:
  security:
    allowInsecureImages: true
  imagePullSecrets:
    - name: enterprise-pull-secret

replicaCount: 1
# @docs:skip -- internal override, not user-configurable
nameOverride: ""
fullnameOverride: ""

image:
  repository: images.astrid.fit/proxy/astrid/alicenstar/astrid
  tag: "0.1.0"
  pullPolicy: Always

imagePullSecrets: []

initImage: images.astrid.fit/proxy/astrid/busybox:1.36

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: astrid.fit
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# --- Embedded PostgreSQL (Bitnami subchart) ---
postgresql:
  enabled: true
  image:
    registry: images.astrid.fit
    repository: proxy/astrid/bitnamilegacy/postgresql
    tag: 17.2.0-debian-12-r5
  auth:
    username: astrid
    password: astrid
    database: astrid
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# --- BYO PostgreSQL ---
externalDatabase:
  host: ""
  port: 5432
  user: ""
  password: ""
  database: "astrid"

# --- Embedded Redis (Bitnami subchart) ---
redis:
  enabled: true
  image:
    registry: images.astrid.fit
    repository: proxy/astrid/bitnamilegacy/redis
    tag: 7.4.2-debian-12-r0
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# --- BYO Redis ---
externalRedis:
  host: ""
  port: 6379
  password: ""

# --- TLS ---
tls:
  mode: ""
  secretName: ""
  certManager:
    issuerName: letsencrypt-prod
    issuerKind: ClusterIssuer

# --- Replicated SDK ---
replicated:
  enabled: true
  nameOverride: astrid-sdk

# --- Preflight thresholds ---
preflight:
  minCPU: 2
  minMemory: 4Gi
  minK8sVersion: "1.27.0"
  oauthEndpoint: "https://accounts.google.com/.well-known/openid-configuration"
  unsupportedDistributions:
    - docker-desktop
    - microk8s

# --- Auth ---
auth:
  google:
    clientID: ""
    clientSecret: ""
    redirectURL: ""

# --- Features ---
features:
  streaksEnabled: true
