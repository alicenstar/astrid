apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: astrid
spec:
  chart:
    name: astrid
    chartVersion: 0.2.10
  releaseName: astrid
  values:
    appVersionOverride: repl{{ VersionLabel }}

    image:
      repository: 'repl{{ HasLocalRegistry | ternary (print LocalRegistryHost "/" LocalRegistryNamespace "/alicenstar/astrid") "images.astrid.fit/proxy/astrid/alicenstar/astrid" }}'

    initImage: 'repl{{ HasLocalRegistry | ternary (print LocalRegistryHost "/" LocalRegistryNamespace "/busybox:1.36") "images.astrid.fit/proxy/astrid/busybox:1.36" }}'

    postgresql:
      enabled: repl{{ ConfigOptionEquals "database_type" "embedded_postgres" }}
      auth:
        password: repl{{ ConfigOption "embedded_db_password" }}
      image:
        registry: 'repl{{ HasLocalRegistry | ternary LocalRegistryHost "images.astrid.fit" }}'
        repository: 'repl{{ HasLocalRegistry | ternary (print LocalRegistryNamespace "/bitnamilegacy/postgresql") "proxy/astrid/bitnamilegacy/postgresql" }}'

    redis:
      enabled: repl{{ ConfigOptionEquals "redis_type" "embedded_redis" }}
      image:
        registry: 'repl{{ HasLocalRegistry | ternary LocalRegistryHost "images.astrid.fit" }}'
        repository: 'repl{{ HasLocalRegistry | ternary (print LocalRegistryNamespace "/bitnamilegacy/redis") "proxy/astrid/bitnamilegacy/redis" }}'

    features:
      streaksEnabled: repl{{ ConfigOptionEquals "workout_streaks_toggle" "1" }}

  optionalValues:
    # External PostgreSQL connection
    - when: "repl{{ ConfigOptionEquals `database_type` `external_postgres` }}"
      recursiveMerge: true
      values:
        externalDatabase:
          host: "repl{{ ConfigOption `external_db_host` }}"
          port: "repl{{ ConfigOption `external_db_port` }}"
          user: "repl{{ ConfigOption `external_db_user` }}"
          password: "repl{{ ConfigOption `external_db_password` }}"
          database: "repl{{ ConfigOption `external_db_name` }}"

    # External Redis connection
    - when: "repl{{ ConfigOptionEquals `redis_type` `external_redis` }}"
      recursiveMerge: true
      values:
        externalRedis:
          host: "repl{{ ConfigOption `external_redis_host` }}"
          port: "repl{{ ConfigOption `external_redis_port` }}"
          password: "repl{{ ConfigOption `external_redis_password` }}"

    # Google OAuth (gated by license entitlement)
    - when: "repl{{ and (ConfigOptionEquals `google_oauth_toggle` `1`) (LicenseFieldValue `google_oauth_enabled`) }}"
      recursiveMerge: true
      values:
        auth:
          google:
            clientID: "repl{{ ConfigOption `google_client_id` }}"
            clientSecret: "repl{{ ConfigOption `google_client_secret` }}"
            redirectURL: "repl{{ ConfigOption `google_redirect_url` }}"

  # Builder section: static values for air-gap image discovery
  builder:
    image:
      repository: images.astrid.fit/proxy/astrid/alicenstar/astrid
    initImage: images.astrid.fit/proxy/astrid/busybox:1.36
    postgresql:
      enabled: true
      image:
        registry: images.astrid.fit
        repository: proxy/astrid/bitnamilegacy/postgresql
    redis:
      enabled: true
      image:
        registry: images.astrid.fit
        repository: proxy/astrid/bitnamilegacy/redis
