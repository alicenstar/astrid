{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrid{{if .Title}} — {{.Title}}{{end}}</title>
    <script>document.documentElement.dataset.theme=localStorage.getItem("theme")||"dark"</script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-brand">Astrid</a>
        <div class="nav-links">
            <a href="/" class="{{if eq .ActiveNav "dashboard"}}active{{end}}">Dashboard</a>
            <a href="/plans" class="{{if eq .ActiveNav "plans"}}active{{end}}">Plans</a>
            <a href="/log" class="{{if eq .ActiveNav "log"}}active{{end}}">Log</a>
            <a href="/summary" class="{{if eq .ActiveNav "summary"}}active{{end}}">Summary</a>
            <a href="/workouts" class="{{if eq .ActiveNav "workouts"}}active{{end}}">Workouts</a>
        </div>
        <button class="theme-toggle" onclick="let t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.setItem('theme',t);this.textContent=t==='dark'?'\u2600\uFE0F':'\uD83C\uDF19'" id="theme-btn"></button>
        <script>document.getElementById("theme-btn").textContent=document.documentElement.dataset.theme==="dark"?"\u2600\uFE0F":"\uD83C\uDF19"</script>
    </nav>
    <main class="container">
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
