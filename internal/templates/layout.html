{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrid{{if .Title}} — {{.Title}}{{end}}</title>
    <script>document.documentElement.dataset.theme=localStorage.getItem("theme")||"dark"</script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header>
        <nav class="top-nav" aria-label="Main navigation">
            <a href="/" class="nav-brand">Astrid</a>
            <div class="nav-links">
                <a href="/" {{if eq .ActiveNav "dashboard"}}class="active" aria-current="page"{{end}}>Dashboard</a>
                <a href="/plans" {{if eq .ActiveNav "plans"}}class="active" aria-current="page"{{end}}>Plans</a>
                <a href="/log" {{if eq .ActiveNav "log"}}class="active" aria-current="page"{{end}}>Meal Log</a>
                <a href="/summary" {{if eq .ActiveNav "summary"}}class="active" aria-current="page"{{end}}>Summary</a>
                <a href="/workouts" {{if eq .ActiveNav "workouts"}}class="active" aria-current="page"{{end}}>Workouts</a>
            </div>
            <button class="theme-toggle" aria-label="Toggle dark and light mode" onclick="let t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.setItem('theme',t);this.textContent=t==='dark'?'\u2600\uFE0F':'\uD83C\uDF19'" id="theme-btn"></button>
            <script>document.getElementById("theme-btn").textContent=document.documentElement.dataset.theme==="dark"?"\u2600\uFE0F":"\uD83C\uDF19"</script>
        </nav>
    </header>
    <main id="main-content" class="container">
        {{template "content" .}}
    </main>
    <footer class="sr-only">
        <p>Astrid — Fitness and nutrition tracker</p>
    </footer>
</body>
</html>
{{end}}
