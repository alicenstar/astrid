{{define "content"}}
<div class="card" style="max-width:420px; margin:3rem auto;">
    <h1 style="margin-bottom:1.5rem; text-align:center;">Log in to Astrid</h1>

    {{if .Error}}
    <div class="flash flash-error" role="alert">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/login">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{.Email}}" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-bottom:0.75rem;">Log In</button>
    </form>

    {{if .GoogleEnabled}}
    <a href="/auth/google" class="btn btn-ghost" style="width:100%; margin-bottom:0.75rem; text-align:center;">Continue with Google</a>
    {{end}}

    <form method="POST" action="/login/demo">
        <button type="submit" class="btn btn-ghost" style="width:100%; background:rgba(255,253,130,0.15); color:var(--warning); border-color:var(--warning);">Demo Login</button>
    </form>

    <p style="text-align:center; margin-top:1rem; font-size:0.9rem; color:var(--text-muted);">
        Don't have an account? <a href="/signup">Sign up</a>
    </p>
</div>
{{end}}
