{{define "content"}}
<div class="card" style="max-width:420px; margin:3rem auto;">
    <h1 style="margin-bottom:1.5rem; text-align:center;">Create an Account</h1>

    {{if .Error}}
    <div class="flash flash-error" role="alert">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/signup">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{.Name}}" required autocomplete="name">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{.Email}}" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
            <span style="font-size:0.8rem; color:var(--text-muted);">At least 8 characters</span>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-bottom:0.75rem;">Sign Up</button>
    </form>

    {{if .GoogleEnabled}}
    <a href="/auth/google" class="btn btn-ghost" style="width:100%; margin-bottom:0.75rem; text-align:center;">Sign up with Google</a>
    {{end}}

    <p style="text-align:center; margin-top:1rem; font-size:0.9rem; color:var(--text-muted);">
        Already have an account? <a href="/login">Log in</a>
    </p>
</div>
{{end}}
