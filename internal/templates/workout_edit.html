{{define "content"}}
<h1>Edit Split</h1>

<div class="card">
    <form method="POST" action="/workouts/{{.Split.ID}}/edit">
        <div class="form-group">
            <label for="edit-split-name">Split Name</label>
            <input type="text" id="edit-split-name" name="name" value="{{.Split.Name}}" required>
        </div>
        <div class="form-group">
            <fieldset style="border:none; padding:0;">
                <legend style="font-size:0.85rem; color:var(--text-muted); margin-bottom:0.25rem;">Day Labels</legend>
                <div class="day-grid">
                    <div><label for="edit-split-day-0">Sun</label><input type="text" id="edit-split-day-0" name="day_0" value="{{index .DayLabels 0}}"></div>
                    <div><label for="edit-split-day-1">Mon</label><input type="text" id="edit-split-day-1" name="day_1" value="{{index .DayLabels 1}}"></div>
                    <div><label for="edit-split-day-2">Tue</label><input type="text" id="edit-split-day-2" name="day_2" value="{{index .DayLabels 2}}"></div>
                    <div><label for="edit-split-day-3">Wed</label><input type="text" id="edit-split-day-3" name="day_3" value="{{index .DayLabels 3}}"></div>
                    <div><label for="edit-split-day-4">Thu</label><input type="text" id="edit-split-day-4" name="day_4" value="{{index .DayLabels 4}}"></div>
                    <div><label for="edit-split-day-5">Fri</label><input type="text" id="edit-split-day-5" name="day_5" value="{{index .DayLabels 5}}"></div>
                    <div><label for="edit-split-day-6">Sat</label><input type="text" id="edit-split-day-6" name="day_6" value="{{index .DayLabels 6}}"></div>
                </div>
            </fieldset>
        </div>
        <div style="display:flex; gap:0.5rem;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/workouts" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{{end}}
