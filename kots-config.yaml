apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: astrid-config
spec:
  groups:
    # --- Database Configuration (rubric 5.0) ---
    - name: database
      title: Database
      description: Configure how Astrid connects to PostgreSQL.
      items:
        - name: database_type
          title: Database Type
          help_text: >
            Choose "Embedded" to deploy PostgreSQL as part of this installation,
            or "External" to connect to your own PostgreSQL instance.
          type: radio
          default: embedded_postgres
          items:
            - name: embedded_postgres
              title: Embedded PostgreSQL
            - name: external_postgres
              title: External PostgreSQL

        # Auto-generated password that survives upgrades (rubric 5.2)
        - name: embedded_db_password
          title: Embedded Database Password
          help_text: "Auto-generated password for the embedded PostgreSQL instance."
          type: password
          hidden: true
          value: '{{repl RandomString 24}}'

        - name: external_db_host
          title: PostgreSQL Host
          help_text: "Hostname or IP of your PostgreSQL server (e.g., db.example.com or 10.0.1.5)."
          type: text
          when: '{{repl ConfigOptionEquals "database_type" "external_postgres"}}'
          required: true

        - name: external_db_port
          title: PostgreSQL Port
          help_text: "TCP port your PostgreSQL server listens on. Default is 5432."
          type: text
          default: "5432"
          when: '{{repl ConfigOptionEquals "database_type" "external_postgres"}}'
          # Regex validation (rubric 5.3)
          validation:
            regex:
              pattern: "^[0-9]{1,5}$"
              message: "Port must be a number between 1 and 65535."

        - name: external_db_user
          title: PostgreSQL Username
          help_text: "Database user with read/write permissions on the astrid database."
          type: text
          when: '{{repl ConfigOptionEquals "database_type" "external_postgres"}}'
          required: true

        - name: external_db_password
          title: PostgreSQL Password
          help_text: "Password for the PostgreSQL user."
          type: password
          when: '{{repl ConfigOptionEquals "database_type" "external_postgres"}}'
          required: true

        - name: external_db_name
          title: Database Name
          help_text: "Name of the PostgreSQL database. Must already exist on the server."
          type: text
          default: "astrid"
          when: '{{repl ConfigOptionEquals "database_type" "external_postgres"}}'

    # --- Redis Configuration (rubric 5.0) ---
    - name: redis
      title: Redis / Cache
      description: Configure how Astrid connects to Redis for sessions and caching.
      items:
        - name: redis_type
          title: Redis Type
          help_text: >
            Choose "Embedded" to deploy Redis as part of this installation,
            or "External" to connect to your own Redis instance.
          type: radio
          default: embedded_redis
          items:
            - name: embedded_redis
              title: Embedded Redis
            - name: external_redis
              title: External Redis

        - name: external_redis_host
          title: Redis Host
          help_text: "Hostname or IP of your Redis server (e.g., redis.example.com or 10.0.1.10)."
          type: text
          when: '{{repl ConfigOptionEquals "redis_type" "external_redis"}}'
          required: true

        - name: external_redis_port
          title: Redis Port
          help_text: "TCP port your Redis server listens on. Default is 6379."
          type: text
          default: "6379"
          when: '{{repl ConfigOptionEquals "redis_type" "external_redis"}}'
          validation:
            regex:
              pattern: "^[0-9]{1,5}$"
              message: "Port must be a number between 1 and 65535."

        - name: external_redis_password
          title: Redis Password
          help_text: "Password for your Redis server. Leave blank if authentication is not required."
          type: password
          when: '{{repl ConfigOptionEquals "redis_type" "external_redis"}}'

    # --- Features (rubric 5.1 + 4.7: license entitlement gates config) ---
    - name: features
      title: Features
      description: Enable or disable optional application features.
      items:
        - name: google_oauth_toggle
          title: Google OAuth Single Sign-On
          help_text: >
            Enable Google OAuth login for your users. Requires the "Google OAuth"
            license entitlement and a Google Cloud OAuth 2.0 client ID and secret.
          type: bool
          default: "0"
          # Gated by license entitlement (rubric 4.7)
          when: '{{repl LicenseFieldValue "google_oauth_enabled"}}'

        - name: google_client_id
          title: Google OAuth Client ID
          help_text: "OAuth 2.0 Client ID from Google Cloud Console (APIs & Services > Credentials)."
          type: text
          when: '{{repl and (ConfigOptionEquals "google_oauth_toggle" "1") (LicenseFieldValue "google_oauth_enabled")}}'
          required: true

        - name: google_client_secret
          title: Google OAuth Client Secret
          help_text: "OAuth 2.0 Client Secret from Google Cloud Console."
          type: password
          when: '{{repl and (ConfigOptionEquals "google_oauth_toggle" "1") (LicenseFieldValue "google_oauth_enabled")}}'
          required: true

        - name: google_redirect_url
          title: Google OAuth Redirect URL
          help_text: "Callback URL registered in Google Cloud Console (e.g., https://astrid.example.com/auth/google/callback). Must use HTTPS."
          type: text
          when: '{{repl and (ConfigOptionEquals "google_oauth_toggle" "1") (LicenseFieldValue "google_oauth_enabled")}}'
          required: true
          validation:
            regex:
              pattern: "^https://"
              message: "Redirect URL must start with https://"
