apiVersion: kots.io/v1beta1
kind: Application
metadata:
  name: astrid
spec:
  title: Astrid
  icon: data:image/svg+xml;base64,
  statusInformers:
    - deployment/astrid
  ports:
    - serviceName: astrid
      servicePort: 8080
      localPort: 8080
      applicationUrl: "http://astrid.local"
  allowRollback: true
